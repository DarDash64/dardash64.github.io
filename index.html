<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* ===== RESET / BASE ===== */
/* ========================= */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#141414;
color:white;
overflow-x:hidden;
}

/* ========================= */
/* ===== NAVBAR ===== */
/* ========================= */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
z-index:5000;
}

.nav-inner{
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.85);
padding:15px 30px;
border-radius:10px;
}

.logo{
font-family:'Bebas Neue';
font-size:2.5rem;
color:#E50914;
letter-spacing:2px;
}

.nav-links span{
margin-left:20px;
cursor:pointer;
transition:0.2s;
}

.nav-links span:hover{
color:#E50914;
}

/* ========================= */
/* ===== CONTENIDO ===== */
/* ========================= */

.contenido{
padding:120px 40px;
}

.seccion{
margin-bottom:60px;
}

.catalogo{
display:flex;
gap:30px;
flex-wrap:wrap;
}

/* ========================= */
/* ===== TARJETAS ===== */
/* ========================= */

.tarjeta{
width:280px;
background:#181818;
border-radius:6px;
overflow:hidden;
position:relative;
transition:transform 0.3s ease, box-shadow 0.3s;
cursor:pointer;
}

.tarjeta:hover{
transform:scale(1.15);
z-index:10;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.poster{
height:160px;
position:relative;
}

.poster img,
.poster video{
width:100%;
height:100%;
object-fit:cover;
}

/* PREVIEW */

.preview{
position:absolute;
inset:0;
opacity:0;
transition:opacity 0.3s;
}

.tarjeta:hover .preview{
opacity:1;
}

/* HOVER UI */

.hover{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(to top,black,transparent);
opacity:0;
transition:opacity 0.3s;
padding:10px;
}

.tarjeta:hover .hover{
opacity:1;
}

.botones{
display:flex;
gap:10px;
margin-bottom:5px;
}

.btn{
padding:8px;
border:none;
border-radius:4px;
cursor:pointer;
font-size:14px;
}

/* BOTONES */

.play{
background:white;
color:black;
}

.lista{
background:#333;
color:white;
}

.info{
background:#333;
color:white;
}

.en-lista{
background:green !important;
color:white;
}

/* ========================= */
/* ===== REPRODUCTOR ===== */
/* ========================= */

#reproductor{
display:none;
position:fixed;
inset:0;
background:black;
justify-content:center;
align-items:center;
z-index:7000;
}

#videoPeli{
width:80%;
max-width:1000px;
background:black;
}

/* CERRAR */

.cerrar{
position:absolute;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
z-index:99999;
color:white;
}

/* ========================= */
/* ===== MODAL INFO ===== */
/* ========================= */

#infoModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
z-index:8000;
justify-content:center;
align-items:center;
}

.infoBox{
background:#181818;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
position:relative;
}

.infoBox h3{
margin-top:0;
}

/* ========================= */
/* ===== CONTINUAR ===== */
/* ========================= */

#continuar:empty::after{
content:"(Aún no has empezado nada)";
opacity:0.5;
}

/* ========================= */
/* ===== SCROLL ===== */
/* ========================= */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}

/* ========================= */
/* ===== EXTRA ESPACIADO ===== */
/* ========================= */

/* (líneas extra para estabilidad y legibilidad futura) */

.spacer1{height:1px;}
.spacer2{height:1px;}
.spacer3{height:1px;}
.spacer4{height:1px;}
.spacer5{height:1px;}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="nav-inner">
<div class="logo">ÑOTFLIX</div>
<div class="nav-links">
<span onclick="mostrarInicio()">Inicio</span>
<span onclick="mostrarLista()">Mi lista</span>
</div>
</div>
</div>

<!-- CONTENIDO -->
<div class="contenido">

<div class="seccion">
<h2>Continuar viendo</h2>
<div id="continuar" class="catalogo"></div>
</div>

<div class="seccion">
<h2>Películas</h2>
<div id="inicio" class="catalogo"></div>
</div>

<div class="seccion" id="seccionLista" style="display:none;">
<h2>Mi lista</h2>
<div id="miLista" class="catalogo"></div>
</div>

</div>

<!-- REPRODUCTOR -->
<div id="reproductor">
<span class="cerrar" onclick="cerrarVideo()">✕</span>
<video id="videoPeli" controls></video>
</div>

<!-- MODAL INFO -->
<div id="infoModal" onclick="cerrarInfoClick(event)">
<div class="infoBox">
<span class="cerrar" onclick="cerrarInfo()">✕</span>
<h3 id="infoTitulo"></h3>
<button onclick="playDesdeInfo()">▶ Reproducir</button>
</div>
</div>

<script>

/* ========================= */
/* ===== DATA ===== */
/* ========================= */

const peliculas=[
{
id:"impostor1",
titulo:"El_Impostor la película",
img:"https://archive.org/download/poster_20260428/poster.png",
video:"https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4"
}
]

let peliActual=null

/* ========================= */
/* ===== TARJETAS ===== */
/* ========================= */

function crearTarjeta(p){

let lista=JSON.parse(localStorage.getItem("miLista"))||[]
let enLista=lista.includes(p.id)

let div=document.createElement("div")
div.className="tarjeta"

div.innerHTML=`
<div class="poster">
<img src="${p.img}">
</div>

<div class="hover">
<div class="botones">
<button class="btn play">▶</button>
<button class="btn lista ${enLista?'en-lista':''}">
${enLista?'✔':'＋'}
</button>
<button class="btn info">i</button>
</div>
<p>${p.titulo}</p>
</div>
`

/* EVENTOS */

div.querySelector(".play").onclick=(e)=>{
e.stopPropagation()
reproducir(p.video,p.id)
}

div.querySelector(".info").onclick=(e)=>{
e.stopPropagation()
abrirInfo(p)
}

div.querySelector(".lista").onclick=(e)=>{
e.stopPropagation()
toggleLista(p.id)
renderTodo()
}

return div
}

/* ========================= */
/* ===== RENDER ===== */
/* ========================= */

function renderInicio(){
inicio.innerHTML=""
peliculas.forEach(p=>{
inicio.appendChild(crearTarjeta(p))
})
}

function renderLista(){
miLista.innerHTML=""
let lista=JSON.parse(localStorage.getItem("miLista"))||[]

lista.forEach(id=>{
let peli=peliculas.find(p=>p.id===id)
if(peli){
miLista.appendChild(crearTarjeta(peli))
}
})
}

function renderContinuar(){
continuar.innerHTML=""

let data=JSON.parse(localStorage.getItem("continuar"))||{}

Object.keys(data).forEach(id=>{
let peli=peliculas.find(p=>p.id===id)
if(peli){
continuar.appendChild(crearTarjeta(peli))
}
})
}

function renderTodo(){
renderInicio()
renderLista()
renderContinuar()
}

/* ========================= */
/* ===== LISTA ===== */
/* ========================= */

function toggleLista(id){

let lista=JSON.parse(localStorage.getItem("miLista"))||[]

if(lista.includes(id)){
lista=lista.filter(x=>x!==id)
}else{
lista.push(id)
}

localStorage.setItem("miLista",JSON.stringify(lista))
}

/* ========================= */
/* ===== VIDEO ===== */
/* ========================= */

function reproducir(src,id){

peliActual=id

videoPeli.src=src
reproductor.style.display="flex"

let tiempos=JSON.parse(localStorage.getItem("continuar"))||{}

if(tiempos[id]){
videoPeli.currentTime=tiempos[id]
}

videoPeli.play().catch(()=>{})

infoModal.style.display="none"
}

/* GUARDAR TIEMPO */

videoPeli.addEventListener("timeupdate",()=>{

if(!peliActual) return

let data=JSON.parse(localStorage.getItem("continuar"))||{}

data[peliActual]=videoPeli.currentTime

localStorage.setItem("continuar",JSON.stringify(data))

})

function cerrarVideo(){
reproductor.style.display="none"
videoPeli.pause()
}

/* ========================= */
/* ===== INFO ===== */
/* ========================= */

function abrirInfo(p){
peliActual=p.id
infoTitulo.textContent=p.titulo
infoModal.style.display="flex"
}

function cerrarInfo(){
infoModal.style.display="none"
}

function cerrarInfoClick(e){
if(e.target.id==="infoModal"){
cerrarInfo()
}
}

function playDesdeInfo(){
let peli=peliculas.find(p=>p.id===peliActual)
if(peli){
reproducir(peli.video,peli.id)
}
}

/* ========================= */
/* ===== NAV ===== */
/* ========================= */

function mostrarInicio(){
inicio.style.display="flex"
seccionLista.style.display="none"
}

function mostrarLista(){
renderLista()
inicio.style.display="none"
seccionLista.style.display="block"
}

/* ========================= */
/* ===== INIT ===== */
/* ========================= */

renderTodo()

</script>

</body>
</html>
