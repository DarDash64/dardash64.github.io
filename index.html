<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>
body { background:#141414; color:white; font-family:Arial; margin:0; }

/* NAVBAR */
.navbar {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-sizing:border-box;
    z-index:5000;
}

.logo { color:#E50914; font-size:2rem; font-weight:bold; }
.nav-links span { margin-left:20px; cursor:pointer; }

.contenido { padding:100px 40px 40px; }

h2 { color:#E5E5E5; }

/* TARJETAS */
.catalogo { display:flex; gap:30px; flex-wrap:wrap; }

.tarjeta {
    position:relative;
    width:280px;
    background:#181818;
    border-radius:4px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.tarjeta:hover { transform:scale(1.15); z-index:20; }

/* POSTER */
.contenedor-poster { height:160px; position:relative; }
.contenedor-poster img,
.contenedor-poster video {
    width:100%; height:100%; object-fit:cover;
}

/* HOVER */
.hover-info {
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top, black, transparent);
    opacity:0;
    transition:0.3s;
    padding:10px;
}
.tarjeta:hover .hover-info { opacity:1; }

/* BOTONES */
.botones { display:flex; gap:10px; }
.btn { padding:8px 12px; border:none; border-radius:4px; cursor:pointer; }
.play { background:white; color:black; }
.lista { background:rgba(255,255,255,0.2); color:white; }
.en-lista { background:green !important; }

/* BLOQUEADA */
.bloqueada { opacity:0.5; pointer-events:none; }

/* OVERLAY */
.overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:6000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* MENÚ */
.menu-box {
    background:#181818;
    padding:30px;
    border-radius:8px;
    text-align:center;
    min-width:300px;
}

.menu-box button {
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.play-btn { background:white; color:black; }
.extra-btn { background:rgba(255,255,255,0.2); color:white; }

/* ❌ */
.cerrar {
    position:fixed;
    top:20px;
    right:20px;
    font-size:40px;
    cursor:pointer;
    z-index:9999;
}

/* REPRODUCTOR */
#reproductor {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:7000;
}

video { max-width:80%; }

/* SCROLL */
.fila-saga {
    display:flex;
    gap:20px;
    overflow-x:auto;
    scroll-behavior:smooth;
    padding:20px;
}
.fila-saga::-webkit-scrollbar { display:none; }

.flecha {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    cursor:pointer;
}
.flecha.izq { left:10px; }
.flecha.der { right:10px; }
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">ÑOTFLIX</div>
    <div class="nav-links">
        <span onclick="mostrarInicio()">Inicio</span>
        <span onclick="mostrarLista()">Mi lista</span>
    </div>
</div>

<div class="contenido">

<h2 id="tituloPeliculas">Películas</h2>

<div id="inicio" class="catalogo">

<div class="tarjeta" data-id="impostor1">
    <div class="contenedor-poster">
        <img id="img1" src="https://archive.org/download/poster_20260428/poster.png">
        <video id="preview1" muted loop style="display:none;">
            <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
        </video>
    </div>

    <div class="hover-info">
        <div class="botones">
            <button class="btn play" onclick="reproducir()">▶</button>
            <button class="btn lista" onclick="toggleLista(event,'impostor1')">＋</button>
        </div>
        <p>El_Impostor la película</p>
        <button onclick="abrirMenu()">Más info</button>
    </div>
</div>

<div class="tarjeta bloqueada" data-id="impostor2">
    <div class="contenedor-poster">
        <img src="https://archive.org/download/poster2_202604/poster2.png">
    </div>
</div>

</div>

<h2 id="tituloLista" style="display:none;">Mi lista</h2>
<div id="miLista" class="catalogo" style="display:none;"></div>

</div>

<!-- MENU -->
<div id="menuPrincipal" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <div class="menu-box">
        <button class="play-btn" onclick="reproducir()">▶ Reproducir</button>
        <button class="extra-btn" onclick="abrirSaga()">Más de esta saga</button>
    </div>
</div>

<!-- SAGA -->
<div id="menuSaga" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <h2>El Impostor - Saga</h2>

    <div class="flecha izq" onclick="scrollSaga(-1)">❮</div>
    <div class="flecha der" onclick="scrollSaga(1)">❯</div>

    <div class="fila-saga" id="filaSaga">
        <div class="tarjeta" onclick="reproducir()">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster_20260428/poster.png">
            </div>
        </div>

        <div class="tarjeta bloqueada">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster2_202604/poster2.png">
            </div>
        </div>
    </div>
</div>

<!-- VIDEO -->
<div id="reproductor">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <video id="videoPeli" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>
const menu = document.getElementById("menuPrincipal");
const saga = document.getElementById("menuSaga");
const reproductor = document.getElementById("reproductor");
const video = document.getElementById("videoPeli");

/* CONTROL */
function cerrarTodo(){
    menu.style.display="none";
    saga.style.display="none";
    reproductor.style.display="none";
    video.pause();
    video.currentTime=0;
}

/* MENÚ */
function abrirMenu(){ cerrarTodo(); menu.style.display="flex"; }
function abrirSaga(){ menu.style.display="none"; saga.style.display="flex"; }

/* VIDEO */
function reproducir(){
    cerrarTodo();
    reproductor.style.display="flex";
    video.load();
    video.play().catch(()=>{});
}

/* NAV */
function mostrarInicio(){
    document.getElementById("inicio").style.display="flex";
    document.getElementById("miLista").style.display="none";
    document.getElementById("tituloLista").style.display="none";
    document.getElementById("tituloPeliculas").style.display="block";
}

function mostrarLista(){
    actualizarMiLista();
    document.getElementById("inicio").style.display="none";
    document.getElementById("miLista").style.display="flex";
    document.getElementById("tituloLista").style.display="block";
    document.getElementById("tituloPeliculas").style.display="none";
}

/* SCROLL */
function scrollSaga(dir){
    document.getElementById("filaSaga").scrollBy({left:dir*300,behavior:"smooth"});
}

/* PREVIEW */
const tarjeta = document.querySelector('[data-id="impostor1"]');
const img = document.getElementById("img1");
const preview = document.getElementById("preview1");

tarjeta.addEventListener("mouseenter",()=>{
    img.style.display="none";
    preview.style.display="block";
    preview.play();
});

tarjeta.addEventListener("mouseleave",()=>{
    preview.pause();
    preview.currentTime=0;
    preview.style.display="none";
    img.style.display="block";
});

/* MI LISTA */
function toggleLista(e,id){
    e.stopPropagation();
    let lista = JSON.parse(localStorage.getItem("miLista"))||[];

    if(lista.includes(id)){
        lista = lista.filter(x=>x!==id);
    }else{
        lista.push(id);
    }

    localStorage.setItem("miLista",JSON.stringify(lista));
    actualizarBotones();
}

function actualizarBotones(){
    let lista = JSON.parse(localStorage.getItem("miLista"))||[];

    document.querySelectorAll(".tarjeta").forEach(t=>{
        let id = t.dataset.id;
        let btn = t.querySelector(".lista");
        if(!btn) return;

        if(lista.includes(id)){
            btn.classList.add("en-lista");
            btn.textContent="✔";
        }else{
            btn.classList.remove("en-lista");
            btn.textContent="＋";
        }
    });
}

function actualizarMiLista(){
    let lista = JSON.parse(localStorage.getItem("miLista"))||[];
    let contenedor = document.getElementById("miLista");
    contenedor.innerHTML="";

    lista.forEach(id=>{
        if(id==="impostor1"){
            contenedor.innerHTML += `
            <div class="tarjeta">
                <div class="contenedor-poster">
                    <img src="https://archive.org/download/poster_20260428/poster.png">
                </div>
                <div class="hover-info">
                    <button class="btn play" onclick="reproducir()">▶</button>
                </div>
            </div>`;
        }
    });
}

actualizarBotones();

/* CIERRES */
[menu,saga,reproductor].forEach(el=>{
    el.addEventListener("click",e=>{
        if(e.target===el) cerrarTodo();
    });
});

window.addEventListener("keydown",e=>{
    if(e.key==="Escape") cerrarTodo();
});
</script>

</body>
</html>
