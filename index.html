<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>
body {
    background:#141414;
    color:white;
    font-family:Arial;
    margin:0;
    padding:40px;
}

h1 { color:#E50914; font-size:3rem; letter-spacing:4px; }
h2 { color:#E5E5E5; }

.catalogo {
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

/* TARJETAS */
.tarjeta {
    position:relative;
    width:280px;
    background:#181818;
    border-radius:4px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.tarjeta:hover {
    transform:scale(1.1);
    z-index:10;
    box-shadow:0 0 20px rgba(229,9,20,0.6);
}

.bloqueada {
    opacity:0.5;
    pointer-events:none;
}

/* POSTER */
.contenedor-poster {
    width:100%;
    height:160px;
}

.contenedor-poster img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INFO */
.info-peli {
    padding:10px;
}

.titulo-peli {
    margin:0;
}

/* HOVER INFO */
.hover-info {
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top, black, transparent);
    opacity:0;
    transition:0.3s;
    padding:10px;
}

.tarjeta:hover .hover-info {
    opacity:1;
}

/* BOTONES */
.botones {
    display:flex;
    gap:10px;
}

.btn {
    padding:8px 12px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.play { background:white; color:black; }
.lista { background:rgba(255,255,255,0.2); color:white; }

.en-lista { background:green !important; }

/* OVERLAYS */
.overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:2000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* MENÚ */
.menu-box {
    background:#181818;
    padding:30px;
    border-radius:8px;
    text-align:center;
    min-width:300px;
}

.menu-box button {
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.play-btn { background:white; color:black; font-weight:bold; }
.extra-btn { background:rgba(255,255,255,0.2); color:white; }

.cerrar {
    position:absolute;
    top:20px;
    right:40px;
    font-size:40px;
    cursor:pointer;
}

/* REPRODUCTOR */
#reproductor {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:3000;
}

video {
    width:80%;
    max-width:1000px;
}
</style>
</head>

<body>

<h1>ÑOTFLIX</h1>
<h2>Películas</h2>

<div class="catalogo">

<!-- TARJETA 1 -->
<div class="tarjeta" data-id="impostor1">
    <div class="contenedor-poster">
        <img src="https://archive.org/download/poster_20260428/poster.png">
    </div>

    <div class="hover-info">
        <div class="botones">
            <button class="btn play" onclick="reproducir()">▶</button>
            <button class="btn lista" onclick="toggleLista(event,'impostor1')">＋</button>
        </div>
        <p>El_Impostor la película</p>
        <button onclick="abrirMenu()">Más info</button>
    </div>
</div>

<!-- TARJETA 2 -->
<div class="tarjeta bloqueada">
    <div class="contenedor-poster">
        <img src="https://archive.org/download/poster2_202604/poster2.png">
    </div>
    <div class="info-peli">
        <p class="titulo-peli">El_Impostor 2 la película</p>
    </div>
</div>

</div>

<!-- MENU -->
<div id="menuPrincipal" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <div class="menu-box">
        <button class="play-btn" onclick="reproducir()">▶ Reproducir</button>
        <button class="extra-btn" onclick="abrirSaga()">Más de esta saga</button>
    </div>
</div>

<!-- SAGA -->
<div id="menuSaga" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <h2>El Impostor - Saga</h2>

    <div class="catalogo">

        <div class="tarjeta" onclick="reproducir()">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster_20260428/poster.png">
            </div>
            <div class="info-peli">
                <p class="titulo-peli">El_Impostor la película</p>
            </div>
        </div>

        <div class="tarjeta bloqueada">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster2_202604/poster2.png">
            </div>
            <div class="info-peli">
                <p class="titulo-peli">El_Impostor 2 la película</p>
            </div>
        </div>

    </div>
</div>

<!-- VIDEO -->
<div id="reproductor">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <video id="videoPeli" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>
const menu = document.getElementById("menuPrincipal");
const saga = document.getElementById("menuSaga");
const reproductor = document.getElementById("reproductor");
const video = document.getElementById("videoPeli");

/* CONTROL GLOBAL */
function cerrarTodo() {
    menu.style.display = "none";
    saga.style.display = "none";
    reproductor.style.display = "none";

    video.pause();
    video.currentTime = 0;
}

/* MENÚ */
function abrirMenu() {
    cerrarTodo();
    menu.style.display = "flex";
}

function abrirSaga() {
    menu.style.display = "none";
    saga.style.display = "flex";
}

/* VIDEO */
function reproducir() {
    cerrarTodo();
    reproductor.style.display = "flex";

    video.load();
    video.play().catch(()=>{});
}

/* CLICK FUERA */
[menu, saga, reproductor].forEach(el=>{
    el.addEventListener("click", e=>{
        if(e.target === el) cerrarTodo();
    });
});

/* ESC */
window.addEventListener("keydown", e=>{
    if(e.key === "Escape") cerrarTodo();
});

/* MI LISTA */
function toggleLista(e,id){
    e.stopPropagation();

    let lista = JSON.parse(localStorage.getItem("miLista")) || [];

    if(lista.includes(id)){
        lista = lista.filter(x=>x!==id);
    }else{
        lista.push(id);
    }

    localStorage.setItem("miLista", JSON.stringify(lista));
    actualizarBotones();
}

function actualizarBotones(){
    let lista = JSON.parse(localStorage.getItem("miLista")) || [];

    document.querySelectorAll(".tarjeta").forEach(t=>{
        let id = t.dataset.id;
        let btn = t.querySelector(".lista");

        if(!btn) return;

        if(lista.includes(id)){
            btn.classList.add("en-lista");
            btn.textContent="✔";
        }else{
            btn.classList.remove("en-lista");
            btn.textContent="＋";
        }
    });
}

actualizarBotones();
</script>

</body>
</html>
