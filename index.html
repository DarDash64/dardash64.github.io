<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>
body { background:#141414; color:white; font-family:Arial; margin:0; padding:40px; }
h1 { color:#E50914; font-size:3rem; letter-spacing:4px; }
h2 { color:#E5E5E5; }

.catalogo { display:flex; gap:30px; flex-wrap:wrap; }

.tarjeta {
    background:#181818;
    border-radius:4px;
    width:280px;
    overflow:hidden;
    cursor:pointer;
}

.bloqueada { opacity:0.6; filter:grayscale(0.5); cursor:not-allowed; }

.contenedor-poster { height:160px; background:#333; display:flex; align-items:center; justify-content:center; }
.contenedor-poster img { width:100%; height:100%; object-fit:cover; }

.info-peli { padding:15px; }

/* MENÚ PRINCIPAL */
#menuPeli, #menuSaga {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    z-index:1100;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button {
    margin:10px;
    padding:12px 25px;
    border:none;
    cursor:pointer;
}

.play-btn { background:white; color:black; }
.extra-btn { background:rgba(255,255,255,0.2); color:white; }

.cerrar {
    position:absolute;
    top:20px; right:40px;
    font-size:50px;
    cursor:pointer;
}

/* REPRODUCTOR */
#reproductor {
    display:none;
    position:fixed;
    width:100%; height:100%;
    background:black;
    justify-content:center;
    align-items:center;
}

video { width:80%; }

/* CATÁLOGO DENTRO DE SAGA */
.saga-catalogo {
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<h1>ÑOTFLIX</h1>
<h2>Películas</h2>

<div class="catalogo">
    <div class="tarjeta" onclick="abrirMenu()">
        <div class="contenedor-poster">
            <img src="https://archive.org/download/poster_20260428/poster.png">
        </div>
        <div class="info-peli">
            El_Impostor la película
        </div>
    </div>

    <div class="tarjeta bloqueada">
        <div class="contenedor-poster">
            <img src="https://archive.org/download/poster2_202604/poster2.png">
        </div>
        <div class="info-peli">
            El_Impostor 2 la película
        </div>
    </div>
</div>

<!-- MENÚ PRINCIPAL -->
<div id="menuPeli">
    <span class="cerrar" onclick="cerrarMenu()">&times;</span>
    <button class="play-btn" onclick="reproducir()">▶ Reproducir</button>
    <button class="extra-btn" onclick="abrirSaga()">Más de esta saga</button>
</div>

<!-- MENÚ SAGA -->
<div id="menuSaga">
    <span class="cerrar" onclick="cerrarSaga()">&times;</span>
    <h2>El Impostor - Saga</h2>

    <div class="saga-catalogo">
        <div class="tarjeta" onclick="reproducir()">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster_20260428/poster.png">
            </div>
            <div class="info-peli">El_Impostor 1</div>
        </div>

        <div class="tarjeta bloqueada">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster2_202604/poster2.png">
            </div>
            <div class="info-peli">El_Impostor 2</div>
        </div>
    </div>
</div>

<!-- REPRODUCTOR -->
<div id="reproductor">
    <span class="cerrar" onclick="cerrarPeli()">&times;</span>
    <video id="videoPeli" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>
const menu = document.getElementById('menuPeli');
const saga = document.getElementById('menuSaga');
const modal = document.getElementById('reproductor');
const video = document.getElementById('videoPeli');

function abrirMenu() { menu.style.display='flex'; }
function cerrarMenu() { menu.style.display='none'; }

function abrirSaga() {
    cerrarMenu();
    saga.style.display='flex';
}

function cerrarSaga() { saga.style.display='none'; }

function reproducir() {
    cerrarMenu();
    cerrarSaga();
    modal.style.display='flex';
    video.play();
}

function cerrarPeli() {
    modal.style.display='none';
    video.pause();
    video.currentTime=0;
}
</script>

</body>
</html>
