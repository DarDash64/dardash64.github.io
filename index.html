<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>
body { 
    background-color: #141414; 
    color: white; 
    font-family: Arial; 
    margin: 0; 
    padding: 40px; 
}
h1 { color:#E50914; font-size:3rem; letter-spacing:4px; }
h2 { color:#E5E5E5; }

.catalogo { display:flex; gap:30px; flex-wrap:wrap; }

/* TARJETAS (NO TOCAR) */
.tarjeta { 
    background:#181818; 
    border-radius:4px; 
    width:280px; 
    overflow:hidden; 
    transition:all 0.3s ease; 
    cursor:pointer;
}
.tarjeta:hover { 
    transform:scale(1.05); 
    box-shadow:0 0 20px rgba(229,9,20,0.6); 
}

.bloqueada { 
    cursor:not-allowed; 
    opacity:0.6; 
    filter:grayscale(0.5); 
}
.bloqueada:hover { transform:none; box-shadow:none; }

.contenedor-poster { 
    height:160px; 
    background:#333; 
    display:flex; 
    align-items:center; 
    justify-content:center; 
}
.contenedor-poster img { width:100%; height:100%; object-fit:cover; }

.info-peli { padding:15px; }

/* ===== MENÚ TIPO NETFLIX ===== */
.overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    z-index:2000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation:fadeIn 0.3s;
}

@keyframes fadeIn {
    from { opacity:0; }
    to { opacity:1; }
}

.menu-box {
    text-align:center;
}

.menu-box button {
    display:block;
    margin:10px auto;
    padding:12px 25px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:1rem;
}

.play-btn { background:white; color:black; font-weight:bold; }
.extra-btn { background:rgba(255,255,255,0.2); color:white; }

.cerrar {
    position:absolute;
    top:20px;
    right:40px;
    font-size:50px;
    cursor:pointer;
}

/* REPRODUCTOR (NO TOCAR) */
#reproductor { 
    display:none; 
    position:fixed; 
    top:0; left:0; 
    width:100%; height:100%; 
    background:rgba(0,0,0,0.95); 
    z-index:1000; 
    justify-content:center; 
    align-items:center; 
}

#videoPeli { 
    width:80%; 
    max-width:1000px; 
    aspect-ratio:16/9; 
}

/* SAGA GRID */
.saga-grid {
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<h1>ÑOTFLIX</h1>
<h2>Películas</h2>

<div class="catalogo">
    <div class="tarjeta" onclick="abrirMenu()">
        <div class="contenedor-poster">
            <img src="https://archive.org/download/poster_20260428/poster.png">
        </div>
        <div class="info-peli">
            El_Impostor la película
        </div>
    </div>

    <div class="tarjeta bloqueada">
        <div class="contenedor-poster">
            <img src="https://archive.org/download/poster2_202604/poster2.png">
        </div>
        <div class="info-peli">
            El_Impostor 2 la película
        </div>
    </div>
</div>

<!-- MENU PRINCIPAL -->
<div id="menuPrincipal" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">&times;</span>
    <div class="menu-box">
        <button class="play-btn" onclick="reproducir()">▶ Reproducir</button>
        <button class="extra-btn" onclick="abrirSaga()">Más de esta saga</button>
        <button class="extra-btn">Añadir a mi lista</button>
    </div>
</div>

<!-- MENU SAGA -->
<div id="menuSaga" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">&times;</span>
    <h2>El Impostor - Saga</h2>

    <div class="saga-grid">
        <div class="tarjeta" onclick="reproducir()">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster_20260428/poster.png">
            </div>
            <div class="info-peli">El_Impostor 1</div>
        </div>

        <div class="tarjeta bloqueada">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster2_202604/poster2.png">
            </div>
            <div class="info-peli">El_Impostor 2</div>
        </div>
    </div>
</div>

<!-- REPRODUCTOR -->
<div id="reproductor">
    <span class="cerrar" onclick="cerrarPeli()">&times;</span>
    <video id="videoPeli" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>
const menu = document.getElementById('menuPrincipal');
const saga = document.getElementById('menuSaga');
const modal = document.getElementById('reproductor');
const video = document.getElementById('videoPeli');

function abrirMenu() {
    menu.style.display = 'flex';
}

function abrirSaga() {
    menu.style.display = 'none';
    saga.style.display = 'flex';
}

function cerrarTodo() {
    menu.style.display = 'none';
    saga.style.display = 'none';
}

function reproducir() {
    cerrarTodo();
    modal.style.display = 'flex';
    video.play();
}

function cerrarPeli() {
    modal.style.display = 'none';
    video.pause();
    video.currentTime = 0;
}
</script>

</body>
</html>
