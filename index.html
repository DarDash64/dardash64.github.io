<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ñotflix - El Impostor</title>
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 40px; }
        h1 { color: #E50914; font-size: 2.5rem; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 1.2rem; color: #fff; margin-bottom: 30px; font-weight: normal; }
        
        .tarjeta { 
            background-color: #2F2F2F; 
            border-radius: 8px; 
            width: 250px; 
            padding: 0; /* Quitamos padding para que la imagen ocupe todo */
            overflow: hidden;
            transition: transform 0.3s; 
            cursor: pointer; 
        }
        .tarjeta:hover { transform: scale(1.05); }
        
        .contenedor-poster { 
            width: 100%; 
            height: 150px; 
            position: relative; 
            background-color: #404040;
        }
        
        .contenedor-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta la imagen sin deformarla */
        }
        
        .tarjeta:hover .contenedor-poster::after { 
            content: '▶'; 
            font-size: 3rem; 
            color: white; 
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .info-peli { padding: 15px; }
        .titulo-peli { font-size: 1.1rem; font-weight: bold; margin: 0 0 5px 0; }
        .descripcion-peli { font-size: 0.85rem; color: #A3A3A3; margin: 0; }

        #reproductor { 
            display: none; position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.95); z-index: 1000; 
            justify-content: center; align-items: center; 
        }
        #videoPeli { width: 90%; max-width: 1000px; background: #000; }
        .cerrar { position: absolute; top: 20px; right: 40px; font-size: 50px; color: white; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

    <h1>ÑOTFLIX</h1>
    <h2>Mis Películas Caseras</h2>

    <div class="tarjeta" onclick="abrirPeli()">
        <div class="contenedor-poster">
            <!-- REEMPLAZA ESTA URL CON TU PÓSTER -->
            <img src="https://archive.org" alt="Póster">
        </div>
        <div class="info-peli">
            <p class="titulo-peli">El Impostor</p>
            <p class="descripcion-peli">Película Completa - HD</p>
        </div>
    </div>

    <div id="reproductor">
        <span class="cerrar" onclick="cerrarPeli()">&times;</span>
        <video id="videoPeli" controls crossorigin="anonymous">
            <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const modal = document.getElementById('reproductor');
        const video = document.getElementById('videoPeli');

        function abrirPeli() {
            modal.style.display = 'flex';
            video.load();
            video.play();
        }

        function cerrarPeli() {
            modal.style.display = 'none';
            video.pause();
        }

        window.addEventListener('keydown', (e) => { if (e.key === "Escape") cerrarPeli(); });
        modal.addEventListener('click', (e) => { if (e.target === modal) cerrarPeli(); });
    </script>
</body>
</html>
