<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ñotflix</title>
    <style>
        body { 
            background-color: #141414; 
            color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 40px; 
        }
        h1 { color: #E50914; font-size: 3rem; margin: 0; letter-spacing: 4px; font-weight: bold; }
        h2 { font-size: 1.2rem; color: #E5E5E5; margin-bottom: 40px; font-weight: 300; }
        
        .catalogo { display: flex; gap: 30px; flex-wrap: wrap; }

        /* Tarjeta con efecto GLOW */
        .tarjeta { 
            background-color: #181818; 
            border-radius: 4px; 
            width: 280px; 
            overflow: hidden; 
            transition: all 0.3s ease; 
            cursor: pointer;
            position: relative;
        }
        
        .tarjeta:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); /* Brillo rojo */
        }

        /* MemeCraft bloqueada */
        .bloqueada { 
            cursor: not-allowed; 
            filter: grayscale(1) brightness(0.5); 
        }

        .contenedor-poster { 
            width: 100%; 
            height: 160px; 
            background-color: #333; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .contenedor-poster img { width: 100%; height: 100%; object-fit: cover; }
        
        .proximamente {
            position: absolute;
            border: 2px solid #E50914;
            color: #E50914;
            padding: 5px 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.8);
        }

        .info-peli { padding: 15px; }
        .titulo-peli { font-size: 1.1rem; font-weight: bold; margin: 0; }

        /* Reproductor */
        #reproductor { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.98); 
            z-index: 1000; justify-content: center; align-items: center; 
        }
        video { width: 90%; max-width: 1000px; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .cerrar { position: absolute; top: 20px; right: 40px; font-size: 50px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1>ÑOTFLIX</h1>
    <h2>Mis Películas Caseras</h2>

    <div class="catalogo">
        <!-- El Impostor -->
        <div class="tarjeta" onclick="abrirPeli()">
            <div class="contenedor-poster">
                <img src="https://archive.org/download/poster_20260428/poster.png" alt="Poster">
            </div>
            <div class="info-peli">
                <p class="titulo-peli">El_Impostor la película</p>
            </div>
        </div>

        <!-- MemeCraft -->
        <div class="tarjeta bloqueada">
            <div class="contenedor-poster">
                <span class="proximamente">Próximamente</span>
                <div style="font-size: 40px;">🎮</div>
            </div>
            <div class="info-peli">
                <p class="titulo-peli">MemeCraft</p>
            </div>
        </div>
    </div>

    <div id="reproductor">
        <span class="cerrar" onclick="cerrarPeli()">&times;</span>
        <!-- Eliminado crossorigin para evitar fallos de carga -->
        <video id="videoPeli" controls preload="metadata">
            <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const modal = document.getElementById('reproductor');
        const video = document.getElementById('videoPeli');

        function abrirPeli() {
            modal.style.display = 'flex';
            video.load(); 
            video.play().catch(() => {
                console.log("Esperando clic del usuario para reproducir");
            });
        }

        function cerrarPeli() {
            modal.style.display = 'none';
            video.pause();
        }

        modal.addEventListener('click', (e) => { if (e.target === modal) cerrarPeli(); });
    </script>
</body>
</html>
