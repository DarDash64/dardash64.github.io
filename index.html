<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ñotflix - El Impostor</title>
    <style>
        body { background-color: #141414; color: white; font-family: Arial, sans-serif; margin: 0; padding: 40px; }
        h1 { color: #E50914; font-size: 3rem; margin: 0; letter-spacing: 4px; }
        h2 { font-size: 1.2rem; color: #E5E5E5; margin-bottom: 40px; }
        
        .tarjeta { 
            background-color: #181818; border-radius: 4px; width: 280px; 
            overflow: hidden; transition: transform 0.3s; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .tarjeta:hover { transform: scale(1.05); }
        .contenedor-poster { width: 100%; height: 160px; background-color: #333; position: relative; }
        .contenedor-poster img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Icono Play */
        .tarjeta:hover .contenedor-poster::after { 
            content: '▶'; font-size: 3rem; color: white; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .info-peli { padding: 15px; }
        .titulo-peli { font-size: 1.1rem; font-weight: bold; margin: 0; }

        /* Modal */
        #reproductor { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: black; 
            z-index: 1000; justify-content: center; align-items: center; 
        }
        video { width: 90%; max-width: 1000px; outline: none; }
        .cerrar { position: absolute; top: 20px; right: 40px; font-size: 50px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1>ÑOTFLIX</h1>
    <h2>Mis Películas Caseras</h2>

    <div class="tarjeta" onclick="abrirPeli()">
        <div class="contenedor-poster">
            <!-- Enlace alternativo de imagen de Archive -->
            <img src="https://archive.org/download/poster_20260428/poster.png" onerror="this.src='https://archive.org'" alt="Poster">
        </div>
        <div class="info-peli">
            <p class="titulo-peli">El Impostor</p>
        </div>
    </div>

    <div id="reproductor">
        <span class="cerrar" onclick="cerrarPeli()">&times;</span>
        <video id="videoPeli" controls>
            <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

    <script>
        const modal = document.getElementById('reproductor');
        const video = document.getElementById('videoPeli');

        function abrirPeli() {
            modal.style.display = 'flex';
            video.load(); // Fuerza al navegador a leer el link de nuevo
            video.play().catch(e => console.log("Error al reproducir: ", e));
        }

        function cerrarPeli() {
            modal.style.display = 'none';
            video.pause();
            video.currentTime = 0;
        }

        modal.addEventListener('click', (e) => { if (e.target === modal) cerrarPeli(); });
    </script>
</body>
</html>
