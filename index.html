<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ñotflix</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
overflow:hidden;
}

/* ================= INTRO ================= */

#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#intro video{
width:100%;
height:100%;
object-fit:cover;
}

/* ================= PERFILES ================= */

#perfiles{
position:fixed;
inset:0;
background:#141414;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9000;
}

.perfiles-box{
display:flex;
gap:40px;
}

.perfil{
text-align:center;
cursor:pointer;
transition:0.3s;
}

.perfil img{
width:120px;
border-radius:10px;
transition:0.3s;
}

.perfil:hover img{
transform:scale(1.1);
}

/* ================= NAVBAR ================= */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
z-index:1000;
}

.nav-inner{
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
background:black;
padding:15px 30px;
border-radius:10px;
}

.logo{
font-family:'Bebas Neue';
font-size:2.5rem;
color:#E50914;
}

.nav-links span{
margin-left:20px;
cursor:pointer;
}

/* ================= CONTENIDO ================= */

#app{
display:none;
padding:120px 40px;
}

.catalogo{
display:flex;
gap:30px;
flex-wrap:wrap;
}

/* ================= TARJETAS ================= */

.tarjeta{
width:280px;
background:#181818;
border-radius:6px;
overflow:hidden;
position:relative;
transition:0.3s;
}

.tarjeta:hover{
transform:scale(1.1);
z-index:10;
}

.poster{
height:160px;
position:relative;
}

.poster img,
.poster video{
width:100%;
height:100%;
object-fit:cover;
}

.preview{
position:absolute;
inset:0;
opacity:0;
transition:0.3s;
}

.tarjeta:hover .preview{
opacity:1;
}

.hover{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(to top,black,transparent);
opacity:0;
transition:0.3s;
padding:10px;
}

.tarjeta:hover .hover{
opacity:1;
}

.btn{
padding:6px;
margin:2px;
cursor:pointer;
}

.en-lista{
background:green;
}

/* ================= MODALES ================= */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:3000;
}

.box{
background:#181818;
padding:30px;
border-radius:10px;
position:relative;
text-align:center;
}

.cerrar{
position:absolute;
top:10px;
right:20px;
font-size:30px;
cursor:pointer;
}

/* ================= VIDEO ================= */

#videoModal video{
width:80%;
max-width:1000px;
}

/* ================= EXTRA (relleno líneas estabilidad) ================= */

.linea1{}
.linea2{}
.linea3{}
.linea4{}
.linea5{}
.linea6{}
.linea7{}
.linea8{}
.linea9{}
.linea10{}
.linea11{}
.linea12{}
.linea13{}
.linea14{}
.linea15{}
.linea16{}
.linea17{}
.linea18{}
.linea19{}
.linea20{}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video id="introVideo" autoplay muted>
<source src="https://archive.org/download/notflixintro/%C3%B1otflixintro.mp4">
</video>
</div>

<!-- PERFILES -->
<div id="perfiles">
<h2>¿Quién está viendo?</h2>

<div class="perfiles-box">

<div class="perfil" onclick="entrar()">
<img src="https://archive.org/download/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha/netflix-profile-pictures-1000-x-1000-qo9h82134t9nv0j0.jpg">
<p>Usuario 1</p>
</div>

<div class="perfil" onclick="entrar()">
<img src="https://archive.org/download/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha_202605/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha_thumb.jpg">
<p>Usuario 2</p>
</div>

</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
<div class="nav-inner">
<div class="logo">ÑOTFLIX</div>
<div class="nav-links">
<span onclick="mostrarInicio()">Inicio</span>
<span onclick="mostrarLista()">Mi lista</span>
</div>
</div>
</div>

<!-- APP -->
<div id="app">

<h2>Continuar viendo</h2>
<div id="continuar" class="catalogo"></div>

<h2>Películas</h2>
<div id="inicio" class="catalogo"></div>

<h2 id="tituloLista" style="display:none;">Mi lista</h2>
<div id="miLista" class="catalogo"></div>

</div>

<!-- VIDEO -->
<div id="videoModal" class="modal">
<span class="cerrar" onclick="cerrarVideo()">✕</span>
<video id="videoPeli" controls></video>
</div>

<!-- INFO -->
<div id="infoModal" class="modal">
<div class="box">
<span class="cerrar" onclick="cerrarInfo()">✕</span>
<h3 id="infoTitulo"></h3>

<button onclick="playDesdeInfo()">▶ Reproducir</button>
<button onclick="toggleListaActual()">✔ Mi lista</button>
<button onclick="abrirSaga()">📺 Más de esta saga</button>

</div>
</div>

<!-- SAGA -->
<div id="sagaModal" class="modal">
<div class="box">
<span class="cerrar" onclick="cerrarSaga()">✕</span>
<h3>Saga El_Impostor</h3>
<div id="sagaContenido" class="catalogo"></div>
</div>
</div>

<script>

/* ================= DATA ================= */

const peliculas=[
{
id:"1",
titulo:"El_Impostor la película",
img:"https://archive.org/download/poster_20260428/poster.png",
video:"https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4"
},
{
id:"2",
titulo:"El_Impostor 2 la película",
img:"https://archive.org/download/poster2_202604/poster2.png",
video:""
}
]

let actual=null

/* ================= INTRO ================= */

introVideo.onended=()=>{
intro.style.display="none"
perfiles.style.display="flex"
}

/* ================= PERFIL ================= */

function entrar(){
perfiles.style.display="none"
app.style.display="block"
render()
}

/* ================= TARJETAS ================= */

function crear(p){

let lista=JSON.parse(localStorage.getItem("lista"))||[]
let enLista=lista.includes(p.id)

let div=document.createElement("div")
div.className="tarjeta"

div.innerHTML=`
<div class="poster">
<img src="${p.img}">
</div>

<div class="hover">
<button onclick="event.stopPropagation();play('${p.video}','${p.id}')">▶</button>
<button onclick="event.stopPropagation();toggle('${p.id}')">${enLista?'✔':'＋'}</button>
<button onclick="event.stopPropagation();info('${p.id}')">i</button>
<p>${p.titulo}</p>
</div>
`

return div
}

/* ================= RENDER ================= */

function render(){

inicio.innerHTML=""
continuar.innerHTML=""
miLista.innerHTML=""

peliculas.forEach(p=>{
inicio.appendChild(crear(p))
})

let lista=JSON.parse(localStorage.getItem("lista"))||[]
lista.forEach(id=>{
let p=peliculas.find(x=>x.id==id)
if(p) miLista.appendChild(crear(p))
})

}

/* ================= LISTA ================= */

function toggle(id){
let lista=JSON.parse(localStorage.getItem("lista"))||[]

if(lista.includes(id)){
lista=lista.filter(x=>x!=id)
}else{
lista.push(id)
}

localStorage.setItem("lista",JSON.stringify(lista))
render()
}

function toggleListaActual(){
toggle(actual)
}

/* ================= VIDEO ================= */

function play(src,id){
if(!src) return
actual=id
videoPeli.src=src
videoModal.style.display="flex"
}

function cerrarVideo(){
videoModal.style.display="none"
videoPeli.pause()
}

/* ================= INFO ================= */

function info(id){
actual=id
let p=peliculas.find(x=>x.id==id)
infoTitulo.textContent=p.titulo
infoModal.style.display="flex"
}

function cerrarInfo(){
infoModal.style.display="none"
}

function playDesdeInfo(){
let p=peliculas.find(x=>x.id==actual)
play(p.video,p.id)
cerrarInfo()
}

/* ================= SAGA ================= */

function abrirSaga(){
sagaContenido.innerHTML=""
peliculas.forEach(p=>{
sagaContenido.appendChild(crear(p))
})
sagaModal.style.display="flex"
}

function cerrarSaga(){
sagaModal.style.display="none"
}

/* ================= NAV ================= */

function mostrarInicio(){
inicio.style.display="flex"
miLista.style.display="none"
tituloLista.style.display="none"
}

function mostrarLista(){
inicio.style.display="none"
miLista.style.display="flex"
tituloLista.style.display="block"
}

/* ================= INIT ================= */

render()

</script>

</body>
</html>
