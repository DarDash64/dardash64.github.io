<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>
body { background:#141414; color:white; font-family:Arial; margin:0; }

/* INTRO */
#intro {
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
}

#intro video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PERFILES */
#perfiles {
    display:none;
    position:fixed;
    inset:0;
    background:#141414;
    z-index:9000;
    text-align:center;
    padding-top:100px;
}

.perfil {
    display:inline-block;
    margin:20px;
    cursor:pointer;
}

.perfil img {
    width:120px;
    border-radius:10px;
    transition:0.3s;
}
.perfil:hover img { transform:scale(1.1); }

/* NAVBAR */
.navbar {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-sizing:border-box;
    z-index:5000;
}

.logo { color:#E50914; font-size:2rem; font-weight:bold; }
.nav-links span { margin-left:20px; cursor:pointer; }

.contenido { padding:100px 40px 40px; }

.catalogo { display:flex; gap:30px; flex-wrap:wrap; }

.tarjeta {
    width:280px;
    background:#181818;
    border-radius:4px;
    overflow:hidden;
    transition:0.3s;
}
.tarjeta:hover { transform:scale(1.1); }

.contenedor-poster img { width:100%; height:160px; object-fit:cover; }

.btn { padding:8px; cursor:pointer; }

.overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:6000;
    justify-content:center;
    align-items:center;
}

.cerrar {
    position:fixed;
    top:20px;
    right:20px;
    font-size:40px;
    cursor:pointer;
    z-index:9999;
}

#reproductor {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:7000;
}
video { max-width:80%; }
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <video id="introVideo" autoplay muted>
        <source src="AQUI_TU_VIDEO_INTRO.mp4">
    </video>
</div>

<!-- PERFILES -->
<div id="perfiles">
    <h1>¿Quién está viendo?</h1>

    <div class="perfil" onclick="entrarPerfil('user1')">
        <img src="https://i.imgur.com/1X6h6XG.png">
        <p>Usuario 1</p>
    </div>

    <div class="perfil" onclick="entrarPerfil('user2')">
        <img src="https://i.imgur.com/1X6h6XG.png">
        <p>Usuario 2</p>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="navbar">
    <div class="logo">ÑOTFLIX</div>
    <div class="nav-links">
        <span onclick="mostrarInicio()">Inicio</span>
        <span onclick="mostrarLista()">Mi lista</span>
    </div>
</div>

<div class="contenido">
<h2 id="tituloPeliculas">Películas</h2>

<div id="inicio" class="catalogo">
<div class="tarjeta" onclick="reproducir()">
    <div class="contenedor-poster">
        <img src="https://archive.org/download/poster_20260428/poster.png">
    </div>
</div>
</div>

<h2 id="tituloLista" style="display:none;">Mi lista</h2>
<div id="miLista" class="catalogo" style="display:none;"></div>

</div>
</div>

<!-- VIDEO -->
<div id="reproductor">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <video id="videoPeli" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>
const intro = document.getElementById("intro");
const introVideo = document.getElementById("introVideo");
const perfiles = document.getElementById("perfiles");
const app = document.getElementById("app");

const reproductor = document.getElementById("reproductor");
const video = document.getElementById("videoPeli");

/* INTRO */
introVideo.onended = ()=>{
    intro.style.display="none";
    perfiles.style.display="block";
};

/* PERFIL */
function entrarPerfil(user){
    localStorage.setItem("perfil", user);
    perfiles.style.display="none";
    app.style.display="block";
}

/* VIDEO */
function reproducir(){
    reproductor.style.display="flex";
    video.play();
}

function cerrarTodo(){
    reproductor.style.display="none";
    video.pause();
}

/* NAV */
function mostrarInicio(){
    document.getElementById("inicio").style.display="flex";
    document.getElementById("miLista").style.display="none";
    document.getElementById("tituloLista").style.display="none";
    document.getElementById("tituloPeliculas").style.display="block";
}

function mostrarLista(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("miLista").style.display="flex";
    document.getElementById("tituloLista").style.display="block";
    document.getElementById("tituloPeliculas").style.display="none";
}
</script>

</body>
</html>
