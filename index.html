<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>
body { background:#141414; color:white; font-family:Arial; padding:40px; }
h1 { color:#E50914; font-size:3rem; letter-spacing:4px; }
h2 { color:#E5E5E5; }

.catalogo { display:flex; gap:30px; flex-wrap:wrap; }

/* TARJETA */
.tarjeta {
    position:relative;
    background:#181818;
    width:280px;
    border-radius:4px;
    overflow:hidden;
    transition:0.3s;
}

.tarjeta:hover {
    transform:scale(1.1);
    z-index:10;
}

/* POSTER */
.contenedor-poster img {
    width:100%;
    height:160px;
    object-fit:cover;
}

/* OVERLAY HOVER */
.hover-info {
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top, black, transparent);
    opacity:0;
    transition:0.3s;
    padding:10px;
}

.tarjeta:hover .hover-info {
    opacity:1;
}

/* BOTONES */
.botones {
    display:flex;
    gap:10px;
}

.btn {
    padding:8px 12px;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

.play { background:white; color:black; }
.lista { background:rgba(255,255,255,0.2); color:white; }

/* BLOQUEADA */
.bloqueada { opacity:0.6; filter:grayscale(1); pointer-events:none; }

/* MENÚ */
.overlay {
    display:none;
    position:fixed;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    top:0; left:0;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
}

/* VIDEO */
#reproductor {
    display:none;
    position:fixed;
    width:100%; height:100%;
    background:black;
    justify-content:center;
    align-items:center;
}

video { width:80%; }

.cerrar {
    position:absolute;
    top:20px;
    right:40px;
    font-size:40px;
    cursor:pointer;
}

/* MARCADO EN LISTA */
.en-lista {
    background:green !important;
}
</style>
</head>

<body>

<h1>ÑOTFLIX</h1>
<h2>Películas</h2>

<div class="catalogo">

<!-- TARJETA 1 -->
<div class="tarjeta" data-id="impostor1">
    <div class="contenedor-poster">
        <img src="https://archive.org/download/poster_20260428/poster.png">
    </div>

    <div class="hover-info">
        <div class="botones">
            <button class="btn play" onclick="reproducir()">▶</button>
            <button class="btn lista" onclick="toggleLista(event,'impostor1')">＋</button>
        </div>
        <p>El_Impostor la película</p>
        <button onclick="abrirMenu()">Más info</button>
    </div>
</div>

<!-- TARJETA 2 -->
<div class="tarjeta bloqueada">
    <div class="contenedor-poster">
        <img src="https://archive.org/download/poster2_202604/poster2.png">
    </div>
</div>

</div>

<!-- MENU -->
<div id="menu" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>
    <button onclick="reproducir()">▶ Reproducir</button>
    <button onclick="abrirSaga()">Más de esta saga</button>
</div>

<!-- SAGA -->
<div id="saga" class="overlay">
    <span class="cerrar" onclick="cerrarTodo()">✕</span>

    <div class="catalogo">
        <div class="tarjeta" onclick="reproducir()">
            <img src="https://archive.org/download/poster_20260428/poster.png">
        </div>

        <div class="tarjeta bloqueada">
            <img src="https://archive.org/download/poster2_202604/poster2.png">
        </div>
    </div>
</div>

<!-- VIDEO -->
<div id="reproductor">
    <span class="cerrar" onclick="cerrarPeli()">✕</span>
    <video id="video" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>
const menu = document.getElementById("menu");
const saga = document.getElementById("saga");
const modal = document.getElementById("reproductor");
const video = document.getElementById("video");

/* MENÚ */
function abrirMenu() { menu.style.display="flex"; }
function abrirSaga() { menu.style.display="none"; saga.style.display="flex"; }
function cerrarTodo() { menu.style.display="none"; saga.style.display="none"; }

/* VIDEO */
function reproducir() {
    cerrarTodo();
    modal.style.display="flex";
    video.play();
}

function cerrarPeli() {
    modal.style.display="none";
    video.pause();
    video.currentTime=0;
}

/* ===== MI LISTA (LOCALSTORAGE) ===== */
function toggleLista(e,id){
    e.stopPropagation();

    let lista = JSON.parse(localStorage.getItem("miLista")) || [];

    if(lista.includes(id)){
        lista = lista.filter(x=>x!==id);
    }else{
        lista.push(id);
    }

    localStorage.setItem("miLista", JSON.stringify(lista));
    actualizarBotones();
}

function actualizarBotones(){
    let lista = JSON.parse(localStorage.getItem("miLista")) || [];

    document.querySelectorAll(".tarjeta").forEach(t=>{
        let id = t.dataset.id;
        let btn = t.querySelector(".lista");

        if(btn){
            if(lista.includes(id)){
                btn.classList.add("en-lista");
                btn.textContent="✔";
            }else{
                btn.classList.remove("en-lista");
                btn.textContent="＋";
            }
        }
    });
}

actualizarBotones();
</script>

</body>
</html>
