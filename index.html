<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<style>

/* ================= BASE ================= */

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#141414;
    color:white;
}

/* ================= INTRO ================= */

#intro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
    transition:opacity 0.6s;
}

#intro video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.skip{
    position:absolute;
    bottom:30px;
    right:30px;
    background:rgba(255,255,255,0.2);
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

/* ================= PERFILES ================= */

#perfiles{
    display:none;
    position:fixed;
    inset:0;
    background:#141414;
    z-index:9000;
    text-align:center;
    padding-top:100px;
}

.perfil{
    display:inline-block;
    margin:30px;
    cursor:pointer;
}

.perfil img{
    width:120px;
    border-radius:10px;
    transition:0.3s;
}

.perfil:hover img{
    transform:scale(1.1);
}

/* ================= NAVBAR ================= */

.navbar{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:5000;
}

.logo{
    color:#E50914;
    font-size:2rem;
    font-weight:bold;
}

.nav-links span{
    margin-left:20px;
    cursor:pointer;
}

/* ================= CONTENIDO ================= */

.contenido{
    padding:100px 40px;
}

.catalogo{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

/* ================= TARJETAS ================= */

.tarjeta{
    width:280px;
    background:#181818;
    border-radius:6px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    transition:0.3s;
}

.tarjeta:hover{
    transform:scale(1.15);
    z-index:10;
}

/* POSTER */

.poster{
    height:160px;
    position:relative;
}

.poster img,
.poster video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* HOVER */

.hover{
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top,black,transparent);
    opacity:0;
    transition:0.3s;
    padding:10px;
}

.tarjeta:hover .hover{
    opacity:1;
}

/* BOTONES */

.botones{
    display:flex;
    gap:10px;
}

.btn{
    padding:8px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.play{background:white;color:black;}
.lista{background:rgba(255,255,255,0.2);color:white;}
.en-lista{background:green !important;}

/* ================= BLOQUEADO ================= */

.bloqueada{
    opacity:0.5;
    pointer-events:none;
}

/* ================= REPRODUCTOR ================= */

#reproductor{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:7000;
}

#videoPeli{
    width:80%;
    max-width:1000px;
}

.cerrar{
    position:absolute;
    top:20px;
    right:20px;
    font-size:40px;
    cursor:pointer;
    z-index:9999;
}

</style>
</head>

<body>

<!-- ================= INTRO ================= -->

<div id="intro">
    <video id="introVideo" muted playsinline preload="auto">
        <source src="https://archive.org/download/notflixintro/%C3%B1otflixintro.mp4" type="video/mp4">
    </video>

    <div class="skip" onclick="salirIntro()">Saltar</div>
</div>

<!-- ================= PERFILES ================= -->

<div id="perfiles">
    <h1>¿Quién está viendo?</h1>

    <div class="perfil" onclick="entrarPerfil('user1')">
        <img src="https://i.imgur.com/1X6h6XG.png">
        <p>Usuario 1</p>
    </div>

    <div class="perfil" onclick="entrarPerfil('user2')">
        <img src="https://i.imgur.com/1X6h6XG.png">
        <p>Usuario 2</p>
    </div>
</div>

<!-- ================= APP ================= -->

<div id="app" style="display:none;">

<div class="navbar">
    <div class="logo">ÑOTFLIX</div>
    <div class="nav-links">
        <span onclick="mostrarInicio()">Inicio</span>
        <span onclick="mostrarLista()">Mi lista</span>
    </div>
</div>

<div class="contenido">

<h2 id="tituloPeliculas">Películas</h2>

<div id="inicio" class="catalogo">

<div class="tarjeta" data-id="impostor1">
    <div class="poster">
        <img src="https://archive.org/download/poster_20260428/poster.png">
    </div>

    <div class="hover">
        <div class="botones">
            <button class="btn play" onclick="reproducir()">▶</button>
            <button class="btn lista" onclick="toggleLista(event,'impostor1')">＋</button>
        </div>
        <p>El Impostor</p>
    </div>
</div>

<div class="tarjeta bloqueada">
    <div class="poster">
        <img src="https://archive.org/download/poster2_202604/poster2.png">
    </div>
</div>

</div>

<h2 id="tituloLista" style="display:none;">Mi lista</h2>
<div id="miLista" class="catalogo" style="display:none;"></div>

</div>
</div>

<!-- ================= REPRODUCTOR ================= -->

<div id="reproductor">
    <span class="cerrar" onclick="cerrarVideo()">✕</span>

    <video id="videoPeli" controls>
        <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
    </video>
</div>

<script>

/* ================= INTRO ================= */

const intro = document.getElementById("intro");
const videoIntro = document.getElementById("introVideo");

function salirIntro(){
    intro.style.opacity="0";
    setTimeout(()=>{
        intro.style.display="none";
        document.getElementById("perfiles").style.display="block";
    },600);
}

/* FIX ARCHIVE */
videoIntro.addEventListener("canplay",()=>{
    videoIntro.play().catch(()=>{});
});

videoIntro.addEventListener("ended",salirIntro);
videoIntro.addEventListener("error",salirIntro);

/* FAILSAFE */
setTimeout(salirIntro,8000);

/* ================= PERFIL ================= */

function entrarPerfil(user){
    localStorage.setItem("perfil",user);
    document.getElementById("perfiles").style.display="none";
    document.getElementById("app").style.display="block";
}

/* ================= VIDEO ================= */

const reproductor = document.getElementById("reproductor");
const video = document.getElementById("videoPeli");

function reproducir(){
    reproductor.style.display="flex";
    video.currentTime=0;
    video.play().catch(()=>{});
}

function cerrarVideo(){
    reproductor.style.display="none";
    video.pause();
}

/* ================= NAV ================= */

function mostrarInicio(){
    document.getElementById("inicio").style.display="flex";
    document.getElementById("miLista").style.display="none";
    document.getElementById("tituloLista").style.display="none";
    document.getElementById("tituloPeliculas").style.display="block";
}

function mostrarLista(){
    actualizarLista();
    document.getElementById("inicio").style.display="none";
    document.getElementById("miLista").style.display="flex";
    document.getElementById("tituloLista").style.display="block";
    document.getElementById("tituloPeliculas").style.display="none";
}

/* ================= MI LISTA ================= */

function toggleLista(e,id){
    e.stopPropagation();

    let lista = JSON.parse(localStorage.getItem("miLista")) || [];

    if(lista.includes(id)){
        lista = lista.filter(x=>x!==id);
    }else{
        lista.push(id);
    }

    localStorage.setItem("miLista",JSON.stringify(lista));
    actualizarBotones();
}

function actualizarBotones(){
    let lista = JSON.parse(localStorage.getItem("miLista")) || [];

    document.querySelectorAll(".tarjeta").forEach(t=>{
        let id = t.dataset.id;
        let btn = t.querySelector(".lista");

        if(!btn) return;

        if(lista.includes(id)){
            btn.textContent="✔";
            btn.classList.add("en-lista");
        }else{
            btn.textContent="＋";
            btn.classList.remove("en-lista");
        }
    });
}

function actualizarLista(){
    let lista = JSON.parse(localStorage.getItem("miLista")) || [];
    let cont = document.getElementById("miLista");

    cont.innerHTML="";

    lista.forEach(id=>{
        if(id==="impostor1"){
            cont.innerHTML += `
            <div class="tarjeta" onclick="reproducir()">
                <div class="poster">
                    <img src="https://archive.org/download/poster_20260428/poster.png">
                </div>
            </div>`;
        }
    });
}

actualizarBotones();

/* ================= CIERRES ================= */

window.addEventListener("keydown",(e)=>{
    if(e.key==="Escape") cerrarVideo();
});

reproductor.addEventListener("click",(e)=>{
    if(e.target===reproductor) cerrarVideo();
});

</script>

</body>
</html>
