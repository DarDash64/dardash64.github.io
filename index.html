<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ñotflix</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
overflow-x:hidden;
}

/* ================= INTRO ================= */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:10000;
transition:opacity 0.5s;
}

#intro video{
width:100%;
height:100%;
object-fit:cover;
}

.skip{
position:absolute;
bottom:30px;
right:30px;
background:rgba(255,255,255,0.2);
padding:10px 20px;
cursor:pointer;
border-radius:6px;
}

/* ================= PERFILES ================= */
#perfiles{
display:none;
position:fixed;
inset:0;
background:#141414;
z-index:9000;
text-align:center;
padding-top:100px;
}

.perfil{
display:inline-block;
margin:30px;
cursor:pointer;
}

.perfil img{
width:130px;
border-radius:10px;
transition:0.3s;
}

.perfil:hover img{
transform:scale(1.1) translateY(-10px);
box-shadow:0 15px 40px black;
}

/* ================= NAV ================= */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
z-index:5000;
}

.nav-inner{
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.8);
padding:15px 30px;
border-radius:10px;
}

.logo{
font-family:'Bebas Neue';
font-size:2.5rem;
color:#E50914;
}

.nav-links span{
margin-left:20px;
cursor:pointer;
}

/* ================= CONTENIDO ================= */
.contenido{
padding:120px 40px;
}

.catalogo{
display:flex;
gap:30px;
flex-wrap:wrap;
}

/* ================= TARJETAS ================= */
.tarjeta{
width:280px;
background:#181818;
border-radius:6px;
overflow:hidden;
position:relative;
transition:0.3s;
cursor:pointer;
}

.tarjeta:hover{
transform:scale(1.15);
z-index:10;
}

.poster{
height:160px;
position:relative;
}

.poster img,
.poster video{
width:100%;
height:100%;
object-fit:cover;
}

.preview{
position:absolute;
inset:0;
opacity:0;
transition:0.3s;
}

.tarjeta:hover .preview{
opacity:1;
}

.hover{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(to top,black,transparent);
opacity:0;
transition:0.3s;
padding:10px;
}

.tarjeta:hover .hover{
opacity:1;
}

.botones{
display:flex;
gap:10px;
}

.btn{
padding:8px;
border:none;
border-radius:4px;
cursor:pointer;
}

.play{background:white;color:black;}
.lista{background:rgba(255,255,255,0.2);color:white;}
.info{background:rgba(255,255,255,0.2);color:white;}
.en-lista{background:green}

/* BLOQUEADA */
.bloqueada{
opacity:0.5;
pointer-events:none;
}

/* ================= REPRODUCTOR ================= */
#reproductor{
display:none;
position:fixed;
inset:0;
background:black;
justify-content:center;
align-items:center;
z-index:7000;
}

#videoPeli{
width:80%;
max-width:1000px;
}

.cerrar{
position:absolute;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
z-index:9999;
}

/* ================= INFO ================= */
#infoModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
z-index:8000;
justify-content:center;
align-items:center;
}

.infoBox{
background:#181818;
padding:30px;
border-radius:10px;
width:500px;
text-align:center;
}

.menuInfo button{
margin:10px;
padding:10px;
cursor:pointer;
}

/* SAGA */
#saga{
display:none;
margin-top:20px;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.volver{
margin-top:20px;
cursor:pointer;
color:#E50914;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video id="introVideo" muted playsinline preload="auto">
<source src="https://archive.org/download/notflixintro/%C3%B1otflixintro.mp4">
</video>
<div class="skip" onclick="salirIntro()">Saltar</div>
</div>

<!-- PERFILES -->
<div id="perfiles">
<h1>¿Quién está viendo?</h1>

<div class="perfil" onclick="entrarPerfil()">
<img src="https://archive.org/download/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha/netflix-profile-pictures-1000-x-1000-qo9h82134t9nv0j0.jpg">
<p>Perfil 1</p>
</div>

<div class="perfil" onclick="entrarPerfil()">
<img src="https://archive.org/download/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha_202605/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha_thumb.jpg">
<p>Perfil 2</p>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="navbar">
<div class="nav-inner">
<div class="logo">ÑOTFLIX</div>
<div class="nav-links">
<span onclick="mostrarInicio()">Inicio</span>
<span onclick="mostrarLista()">Mi lista</span>
</div>
</div>
</div>

<div class="contenido">

<h2 id="tituloPeliculas">Películas</h2>

<div id="inicio" class="catalogo"></div>

<h2 id="tituloLista" style="display:none">Mi lista</h2>
<div id="miLista" class="catalogo" style="display:none"></div>

</div>
</div>

<!-- VIDEO -->
<div id="reproductor">
<span class="cerrar" onclick="cerrarVideo()">✕</span>
<video id="videoPeli" controls></video>
</div>

<!-- INFO -->
<div id="infoModal">
<div class="infoBox">

<span class="cerrar" onclick="cerrarInfo()">✕</span>

<div id="menuInfo">
<button onclick="playDesdeInfo()">▶ Reproducir</button>
<button onclick="mostrarSaga()">Más de esta saga</button>
</div>

<div id="saga"></div>
<div class="volver" onclick="volverMenu()">← Volver</div>

</div>
</div>

<script>

/* ================= DATA ================= */
const peliculas=[
{
id:"impostor1",
titulo:"El_Impostor la película",
img:"https://archive.org/download/poster_20260428/poster.png",
video:"https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4",
preview:"https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4"
},
{
id:"impostor2",
titulo:"El_Impostor 2 la película",
img:"https://archive.org/download/poster2_202604/poster2.png",
bloqueada:true
}
]

let peliActual=null

/* ================= INTRO ROBUSTA ================= */
const introVideo=document.getElementById("introVideo")

introVideo.addEventListener("canplay",()=>{
introVideo.play().catch(()=>{})
})

introVideo.addEventListener("ended",salirIntro)
introVideo.addEventListener("error",salirIntro)

setTimeout(salirIntro,8000)

function salirIntro(){
intro.style.opacity="0"
setTimeout(()=>{
intro.style.display="none"
perfiles.style.display="block"
},500)
}

/* ================= PERFIL ================= */
function entrarPerfil(){
perfiles.style.display="none"
app.style.display="block"
renderInicio()
}

/* ================= CREAR TARJETA ================= */
function crearTarjeta(p){
let d=document.createElement("div")
d.className="tarjeta"
if(p.bloqueada) d.classList.add("bloqueada")

d.innerHTML=`
<div class="poster">
<img src="${p.img}">
${p.preview?`<video class="preview" muted loop src="${p.preview}"></video>`:""}
</div>

<div class="hover">
<div class="botones">
<button class="btn play">▶</button>
<button class="btn lista">＋</button>
<button class="btn info">Más info</button>
</div>
<p>${p.titulo}</p>
</div>
`

if(!p.bloqueada){

d.querySelector(".play").onclick=(e)=>{
e.stopPropagation()
reproducir(p.video)
}

d.querySelector(".info").onclick=(e)=>{
e.stopPropagation()
abrirInfo(p)
}

d.querySelector(".lista").onclick=(e)=>{
e.stopPropagation()
toggleLista(p.id)
}

let v=d.querySelector("video")
if(v){
d.onmouseenter=()=>v.play()
d.onmouseleave=()=>{v.pause();v.currentTime=0}
}
}

return d
}

/* ================= RENDER ================= */
function renderInicio(){
inicio.innerHTML=""
peliculas.forEach(p=>inicio.appendChild(crearTarjeta(p)))
}

/* ================= LISTA ================= */
function toggleLista(id){
let lista=JSON.parse(localStorage.getItem("miLista"))||[]

if(lista.includes(id)){
lista=lista.filter(x=>x!==id)
}else{
lista.push(id)
}

localStorage.setItem("miLista",JSON.stringify(lista))
}

function renderLista(){
miLista.innerHTML=""
let lista=JSON.parse(localStorage.getItem("miLista"))||[]
lista.forEach(id=>{
let p=peliculas.find(x=>x.id===id)
if(p) miLista.appendChild(crearTarjeta(p))
})
}

/* ================= NAV ================= */
function mostrarInicio(){
inicio.style.display="flex"
miLista.style.display="none"
tituloLista.style.display="none"
tituloPeliculas.style.display="block"
}

function mostrarLista(){
renderLista()
inicio.style.display="none"
miLista.style.display="flex"
tituloLista.style.display="block"
tituloPeliculas.style.display="none"
}

/* ================= VIDEO ================= */
function reproducir(src){
videoPeli.src=src
reproductor.style.display="flex"
videoPeli.play().catch(()=>{})
}

function playDesdeInfo(){
if(peliActual) reproducir(peliActual.video)
}

/* ================= INFO ================= */
function abrirInfo(p){
peliActual=p
infoModal.style.display="flex"
menuInfo.style.display="block"
saga.style.display="none"
}

function cerrarInfo(){
infoModal.style.display="none"
}

function mostrarSaga(){
menuInfo.style.display="none"
saga.style.display="flex"
saga.innerHTML=""

peliculas.forEach(p=>{
saga.appendChild(crearTarjeta(p))
})
}

function volverMenu(){
saga.style.display="none"
menuInfo.style.display="block"
}

/* ================= CIERRE VIDEO ================= */
function cerrarVideo(){
reproductor.style.display="none"
videoPeli.pause()
}

</script>

</body>
</html>
