<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ñotflix</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
body{
    margin:0;
    font-family:Arial;
    background:#141414;
    color:white;
}

/* ================= INTRO ================= */
#intro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
    transition:0.5s;
}
#intro video{
    width:100%;
    height:100%;
    object-fit:cover;
}
.skip{
    position:absolute;
    bottom:30px;
    right:30px;
    background:rgba(255,255,255,0.2);
    padding:10px;
    cursor:pointer;
}

/* ================= PERFILES ================= */
#perfiles{
    display:none;
    position:fixed;
    inset:0;
    background:#141414;
    z-index:9000;
    text-align:center;
    padding-top:100px;
}
.perfil{
    display:inline-block;
    margin:30px;
    cursor:pointer;
}
.perfil img{
    width:130px;
    border-radius:10px;
    transition:0.3s;
}
.perfil:hover img{
    transform:scale(1.1) translateY(-10px);
    box-shadow:0 15px 40px black;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:5000;
}
.nav-inner{
    width:90%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.8);
    padding:15px 30px;
    border-radius:10px;
}
.logo{
    font-family:'Bebas Neue', sans-serif;
    font-size:2.5rem;
    color:#E50914;
    letter-spacing:2px;
}
.nav-links span{
    margin-left:20px;
    cursor:pointer;
}

/* ================= CONTENIDO ================= */
.contenido{
    padding:120px 40px;
}
.catalogo{
    display:flex;
    gap:30px;
}

/* ================= TARJETAS ================= */
.tarjeta{
    width:280px;
    background:#181818;
    border-radius:6px;
    overflow:hidden;
    position:relative;
    transition:0.3s;
    cursor:pointer;
}
.tarjeta:hover{
    transform:scale(1.15);
    z-index:10;
}

/* POSTER */
.poster{
    position:relative;
    height:160px;
}
.poster img, .poster video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PREVIEW */
.preview{
    position:absolute;
    inset:0;
    opacity:0;
    transition:0.3s;
}
.tarjeta:hover .preview{
    opacity:1;
}

/* HOVER UI */
.hover{
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top,black,transparent);
    opacity:0;
    transition:0.3s;
    padding:10px;
}
.tarjeta:hover .hover{
    opacity:1;
}

.botones{
    display:flex;
    gap:10px;
}
.btn{
    padding:8px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}
.play{background:white;color:black;}
.lista{background:rgba(255,255,255,0.2);color:white;}
.info{background:rgba(255,255,255,0.2);color:white;}
.en-lista{background:green !important;}

/* BLOQUEADO */
.bloqueada{
    opacity:0.5;
    pointer-events:none;
}

/* ================= REPRODUCTOR ================= */
#reproductor{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:7000;
}
#videoPeli{
    width:80%;
}
.cerrar{
    position:absolute;
    top:20px;
    right:20px;
    font-size:40px;
    cursor:pointer;
}

/* ================= INFO MODAL ================= */
#infoModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    z-index:8000;
    justify-content:center;
    align-items:center;
}
.infoContent{
    background:#181818;
    padding:30px;
    border-radius:10px;
    width:400px;
    text-align:center;
}
.menuInfo button{
    margin:10px;
    padding:10px;
    cursor:pointer;
}

/* ================= SAGA ================= */
#saga{
    display:none;
    margin-top:20px;
    justify-content:center;
    gap:20px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video id="introVideo" muted playsinline preload="auto">
<source src="https://archive.org/download/notflixintro/%C3%B1otflixintro.mp4">
</video>
<div class="skip" onclick="salirIntro()">Saltar</div>
</div>

<!-- PERFILES -->
<div id="perfiles">
<h1>¿Quién está viendo?</h1>

<div class="perfil" onclick="entrarPerfil()">
<img src="https://archive.org/download/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha/netflix-profile-pictures-1000-x-1000-qo9h82134t9nv0j0.jpg">
<p>Perfil 1</p>
</div>

<div class="perfil" onclick="entrarPerfil()">
<img src="https://archive.org/download/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha_202605/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha_thumb.jpg">
<p>Perfil 2</p>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="navbar">
<div class="nav-inner">
<div class="logo">ÑOTFLIX</div>
<div class="nav-links">
<span onclick="mostrarInicio()">Inicio</span>
<span onclick="mostrarLista()">Mi lista</span>
</div>
</div>
</div>

<div class="contenido">

<h2 id="tituloPeliculas">Películas</h2>

<div id="inicio" class="catalogo">

<!-- IMPOSTOR -->
<div class="tarjeta" data-id="impostor1">
<div class="poster">

<img src="https://archive.org/download/poster_20260428/poster.png">

<video class="preview" muted loop>
<source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
</video>

</div>

<div class="hover">
<div class="botones">
<button class="btn play" onclick="reproducir(event)">▶</button>
<button class="btn lista" onclick="toggleLista(event,'impostor1')">＋</button>
<button class="btn info" onclick="abrirInfo(event)">Más info</button>
</div>
<p>El_Impostor la película</p>
</div>
</div>

<!-- IMPOSTOR 2 -->
<div class="tarjeta bloqueada">
<div class="poster">
<img src="https://archive.org/download/poster2_202604/poster2.png">
</div>
<div class="hover">
<p>El_Impostor 2 la película</p>
</div>
</div>

</div>

<h2 id="tituloLista" style="display:none">Mi lista</h2>
<div id="miLista" class="catalogo" style="display:none"></div>

</div>
</div>

<!-- VIDEO -->
<div id="reproductor">
<span class="cerrar" onclick="cerrarVideo()">✕</span>
<video id="videoPeli" controls>
<source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4">
</video>
</div>

<!-- INFO -->
<div id="infoModal">
<div class="infoContent">
<span class="cerrar" onclick="cerrarInfo()">✕</span>

<div id="menuInfo">
<button onclick="reproducir()">▶ Reproducir</button>
<button onclick="mostrarSaga()">Más de esta saga</button>
</div>

<div id="saga">
<div class="tarjeta" onclick="reproducir()">
<img src="https://archive.org/download/poster_20260428/poster.png">
<p>El_Impostor la película</p>
</div>

<div class="tarjeta bloqueada">
<img src="https://archive.org/download/poster2_202604/poster2.png">
<p>El_Impostor 2 la película</p>
</div>
</div>

</div>
</div>

<script>

/* INTRO */
const intro=document.getElementById("intro")
const videoIntro=document.getElementById("introVideo")

function salirIntro(){
intro.style.opacity="0"
setTimeout(()=>{intro.style.display="none";perfiles.style.display="block"},500)
}
videoIntro.addEventListener("canplay",()=>videoIntro.play().catch(()=>{}))
setTimeout(salirIntro,8000)

/* PERFIL */
function entrarPerfil(){
perfiles.style.display="none"
app.style.display="block"
}

/* PREVIEW */
document.querySelectorAll(".tarjeta").forEach(t=>{
const v=t.querySelector("video")
if(v){
t.addEventListener("mouseenter",()=>v.play())
t.addEventListener("mouseleave",()=>{v.pause();v.currentTime=0})
}
})

/* VIDEO */
function reproducir(e){
if(e)e.stopPropagation()
infoModal.style.display="none"
reproductor.style.display="flex"
videoPeli.play()
}

/* INFO */
function abrirInfo(e){
e.stopPropagation()
infoModal.style.display="flex"
saga.style.display="none"
menuInfo.style.display="block"
}

function cerrarInfo(){
infoModal.style.display="none"
}

function mostrarSaga(){
menuInfo.style.display="none"
saga.style.display="flex"
}

/* LISTA (ARREGLADO) */
function toggleLista(e,id){
e.stopPropagation()

let lista=JSON.parse(localStorage.getItem("miLista"))||[]

if(lista.includes(id)){
lista=lista.filter(x=>x!==id)
}else{
lista.push(id)
}

localStorage.setItem("miLista",JSON.stringify(lista))
renderLista()
}

function renderLista(){
let lista=JSON.parse(localStorage.getItem("miLista"))||[]
miLista.innerHTML=""

lista.forEach(id=>{
if(id==="impostor1"){
miLista.innerHTML+=`
<div class="tarjeta" onclick="reproducir()">
<img src="https://archive.org/download/poster_20260428/poster.png">
<p>El_Impostor la película</p>
</div>`
}
})
}

/* NAV */
function mostrarInicio(){
inicio.style.display="flex"
miLista.style.display="none"
tituloLista.style.display="none"
tituloPeliculas.style.display="block"
}

function mostrarLista(){
renderLista()
inicio.style.display="none"
miLista.style.display="flex"
tituloLista.style.display="block"
tituloPeliculas.style.display="none"
}

/* CERRAR */
function cerrarVideo(){
reproductor.style.display="none"
videoPeli.pause()
}

</script>

</body>
</html>
