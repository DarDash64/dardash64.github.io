<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notflix - El Impostor</title>
    <style>
        body { 
            background-color: #141414; 
            color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 40px; 
        }
        h1 { color: #E50914; font-size: 2.5rem; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 1.2rem; color: #fff; margin-bottom: 30px; font-weight: normal; }
        
        .tarjeta { 
            background-color: #2F2F2F; 
            border-radius: 8px; 
            width: 220px; 
            padding: 15px; 
            transition: transform 0.3s, background-color 0.3s; 
            cursor: pointer; 
        }
        .tarjeta:hover { transform: scale(1.05); background-color: #3d3d3d; }
        
        .placeholder-imagen { 
            background-color: #404040; 
            height: 150px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 15px; 
            position: relative; 
        }
        
        /* Efecto Play al pasar el mouse */
        .tarjeta:hover .placeholder-imagen::after { 
            content: '▶'; 
            font-size: 3rem; 
            color: white; 
            position: absolute; 
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .titulo-peli { font-size: 1.1rem; font-weight: bold; margin: 0 0 8px 0; }
        .descripcion-peli { font-size: 0.85rem; color: #A3A3A3; line-height: 1.4; margin: 0; }

        /* Reproductor Modal */
        #reproductor { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.95); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
        }
        #videoPeli { width: 80%; max-width: 1000px; outline: none; border: 2px solid #333; background: black; }
        .cerrar { 
            position: absolute; 
            top: 20px; right: 40px; 
            font-size: 50px; 
            color: white; 
            cursor: pointer; 
            line-height: 1; 
            z-index: 1001;
        }
    </style>
</head>
<body>

    <h1>NOTFLIX</h1>
    <h2>Mis Películas Caseras</h2>

    <div class="tarjeta" onclick="abrirPeli()">
        <div class="placeholder-imagen">
            <svg width="40" viewBox="0 0 24 24" fill="white" style="opacity:0.5"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
        </div>
        <p class="titulo-peli">El Impostor</p>
        <p class="descripcion-peli">Reproducir estreno desde Archive.org</p>
    </div>

    <!-- El Reproductor -->
    <div id="reproductor">
        <span class="cerrar" onclick="cerrarPeli()">&times;</span>
        <video id="videoPeli" controls>
            <!-- NOTA: He cambiado el link a un archivo MP4 real de Archive.org -->
            <source src="https://archive.org/download/el-impostor-la-pelicula/El_Impostor%20la%20pel%C3%ADcula%20FINAL.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

    <script>
        const modal = document.getElementById('reproductor');
        const video = document.getElementById('videoPeli');

        function abrirPeli() {
            modal.style.display = 'flex';
            video.play();
        }

        function cerrarPeli() {
            modal.style.display = 'none';
            video.pause();
            video.currentTime = 0; // Reinicia el video al cerrar
        }

        // Cerrar si se pulsa la tecla Escape
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") cerrarPeli();
        });

        // Cerrar haciendo clic fuera del video
        modal.addEventListener('click', (e) => {
            if (e.target === modal) cerrarPeli();
        });
    </script>
</body>
</html>
